# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - chest_to_base_joint
      - shoulder_to_chest_joint
      - elbow_to_shoulder_joint
      - forearm_to_elbow_joint
      - wrist_to_forearm_joint
      - hand_to_wrist_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
    open_loop_control: true
    allow_nonzero_velocity_at_trajectory_end: true